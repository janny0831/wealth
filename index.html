<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>製程管理系統 - Firebase 自動同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 保持原始樣式不變 */
        .sync-indicator { position: absolute; top: 10px; right: 10px; font-size: 12px; font-weight: bold; }
        #save-loader { transition: opacity 0.3s; }
    </style>
</head>
<body class="p-4">

    <div id="save-loader" class="fixed top-4 right-4 flex items-center text-gray-500 text-sm italic opacity-0">
        <svg class="animate-spin h-4 w-4 mr-2 text-blue-500" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        同步中...
    </div>
    <div id="sync-status" class="sync-indicator text-gray-400">● 雲端連線中...</div>

    <script type="module">
        // 1. 導入 Firebase SDK [cite: 27, 28]
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 2. 您的 Firebase 設定 [cite: 28, 29]
        const firebaseConfig = {
            apiKey: "AIzaSyB-PCNtremx3bmUZk-tk7LLo-zuIaD4yn8",
            authDomain: "thailand-26530.firebaseapp.com",
            projectId: "thailand-26530",
            storageBucket: "thailand-26530.firebasestorage.app",
            messagingSenderId: "383864827104",
            appId: "1:383864827104:web:3dfcebf1045debf494f485",
            measurementId: "G-HCRB6KC4CN"
        };

        // 3. 初始化 Firebase 與 Firestore [cite: 30]
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "process_data", "current_state"); // 指定資料存儲路徑

        // 4. 自動儲存邏輯 (防抖處理) 
        let saveTimeout;
        window.triggerAutoSave = function() {
            document.getElementById('sync-status').innerText = "○ 偵測變更中...";
            document.getElementById('sync-status').className = "sync-indicator text-amber-500";
            document.getElementById('save-loader').style.opacity = "1";
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                await window.performSave();
            }, 1000); // 停止輸入 1 秒後執行
        };

        // 5. 執行儲存：將資料抓取並上傳至 Firebase [cite: 45, 50]
        window.performSave = async function() {
            const formData = {}; 
            // 抓取所有 input/select 的值 (需根據 0515.txt 的實際 ID 修改)
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id) formData[el.id] = el.value;
            });

            try {
                const now = new Date().toLocaleString();
                await setDoc(docRef, { 
                    data: formData, 
                    lastUpdated: now 
                });
                document.getElementById('sync-status').innerText = "● 已同步至雲端";
                document.getElementById('sync-status').className = "sync-indicator text-green-600";
                document.getElementById('save-loader').style.opacity = "0";
            } catch (e) {
                console.error("同步失敗:", e);
                document.getElementById('sync-status').innerText = "× 同步失敗";
            }
        };

        // 6. 初始化讀取：開啟網頁時抓取資料 
        window.initPage = async function() {
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const savedData = snap.data().data;
                    // 將資料填回對應的 ID 欄位 [cite: 54]
                    Object.keys(savedData).forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.value = savedData[id];
                    });
                    document.getElementById('sync-status').innerText = "● 雲端資料已加載";
                } else {
                    document.getElementById('sync-status').innerText = "● 雲端尚無資料";
                }
            } catch (e) {
                console.error("讀取失敗:", e);
            }
        };

        // 綁定所有輸入事件，達成「自動儲存」[cite: 31, 46]
        document.addEventListener('input', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') {
                window.triggerAutoSave();
            }
        });

        // 執行初始化
        window.initPage();
    </script>
</body>
</html>
